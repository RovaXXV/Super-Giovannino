      function placeBrickRow(row, start, length, prizeEvery = 0) {
        for (let offset = 0; offset < length; offset += 1) {
          const value = prizeEvery > 0 && offset % prizeEvery === prizeEvery - 1 ? 10 : 3;
          placeFloatingTile(row, start + offset, value);
        }
      }

      function canSpawnEnemy(column, minDistance = 8) {
        return column >= 6
          && column < finalStart - 5
          && column - lastEnemyColumn >= minDistance;
      }

      function hasStableGroundSupport(column, minWidth = 3) {
        const height = groundHeights[column];

        if (height === null) {
          return false;
        }

        let supportWidth = 1;

        for (let checkColumn = column - 1; checkColumn >= 0 && groundHeights[checkColumn] === height; checkColumn -= 1) {
          supportWidth += 1;
        }

        for (let checkColumn = column + 1; checkColumn < finalStart && groundHeights[checkColumn] === height; checkColumn += 1) {
          supportWidth += 1;
        }

        return supportWidth >= minWidth;
      }

      function hasStablePlatformSupport(row, column, minWidth = 3) {
        if (map[row]?.[column] !== 3 && map[row]?.[column] !== 10) {
          return false;
        }

        let supportWidth = 1;

        for (let checkColumn = column - 1; checkColumn >= 0; checkColumn -= 1) {
          if (map[row][checkColumn] !== 3 && map[row][checkColumn] !== 10) {
            break;
          }

          supportWidth += 1;
        }

        for (let checkColumn = column + 1; checkColumn < finalStart; checkColumn += 1) {
          if (map[row][checkColumn] !== 3 && map[row][checkColumn] !== 10) {
            break;
          }

          supportWidth += 1;
        }

        return supportWidth >= minWidth;
      }

      function markEnemySpawn(column) {
        lastEnemyColumn = Math.max(lastEnemyColumn, column);
      }

      function placeGroundEnemy(column, value, minDistance = 8, force = false) {
        const surfaceRow = getSurfaceRow(column);

        if (surfaceRow === null || !hasStableGroundSupport(column) || (!force && !canSpawnEnemy(column, minDistance))) {
          return false;
        }

        const enemyRow = surfaceRow - 1;

        if (enemyRow < 0 || map[enemyRow][column] !== 0) {
          return false;
        }

        map[enemyRow][column] = value;
        markEnemySpawn(column);
        return true;
      }

      function placePlatformEnemy(platformRow, column, value, minDistance = 8, force = false) {
        if ((!force && !canSpawnEnemy(column, minDistance)) || column < 0 || column >= finalStart) {
          return false;
        }

        if (!hasStablePlatformSupport(platformRow, column)) {
          return false;
        }

        for (let row = platformRow - 1; row >= Math.max(platformRow - 3, 0); row -= 1) {
          if (map[row][column] !== 0) {
            return false;
          }
        }

        map[platformRow - 1][column] = value;
        markEnemySpawn(column);
        return true;
      }

      function placeCoins(row, start, length) {
        for (let offset = 0; offset < length; offset += 1) {
          const column = start + offset;

          if (map[row]?.[column] === 0 && column < finalStart) {
            map[row][column] = 4;
          }
        }
      }

      function placeSpecialCoin(row, column) {
        for (let radius = 0; radius <= 10; radius += 1) {
          for (let direction = -1; direction <= 1; direction += 2) {
            const candidateColumn = column + radius * direction;
            const surfaceRow = getSurfaceRow(candidateColumn);

            if (candidateColumn < 0 || candidateColumn >= finalStart - 3 || usedSpecialColumns.has(candidateColumn)) {
              continue;
            }

            const maxCoinRow = surfaceRow === null ? mapHeight - 2 : surfaceRow - 2;

            for (let rowOffset = 0; rowOffset <= 4; rowOffset += 1) {
              const candidateRow = clamp(row + rowOffset, 0, maxCoinRow);

              if (map[candidateRow][candidateColumn] === 0 || map[candidateRow][candidateColumn] === 4) {
                map[candidateRow][candidateColumn] = 6;
                usedSpecialColumns.add(candidateColumn);
                return true;
              }
            }
          }
        }

        return false;
      }

      // Ki: introduzione piatta, leggibile e con rischio minimo.
      function buildIntroTerrain() {
        for (let column = 0; column < introEnd; column += 1) {
          currentGroundHeight = minGroundHeight;
          groundHeights[column] = minGroundHeight;
        }
      }

      // Sho: terreno a onde e scale geometriche, sempre con differenza massima di 1 blocco.
      function buildWaveSection(start, end, localMaxHeight) {
        let direction = 1;
        let segmentRemaining = 3 + Math.floor(random() * 5);

        for (let column = start; column < end; column += 1) {
          if (segmentRemaining <= 0) {
            direction = pick([-1, 0, 1]);
            segmentRemaining = 3 + Math.floor(random() * 5);
          }

          currentGroundHeight = clamp(currentGroundHeight + direction, minGroundHeight, localMaxHeight);

          if (currentGroundHeight === minGroundHeight) {
            direction = pick([0, 1, 1]);
          } else if (currentGroundHeight === localMaxHeight) {
            direction = pick([-1, -1, 0]);
          }

          setGroundHeight(column, currentGroundHeight);
          segmentRemaining -= 1;
        }
      }

      function buildStair(start, peakHeight, sideLength) {
        const climbLength = Math.max(2, sideLength);
        const totalLength = climbLength * 2 + 1;

        for (let offset = 0; offset < totalLength && start + offset < finalStart - 2; offset += 1) {
          const distanceFromPeak = Math.abs(offset - climbLength);
          const targetHeight = clamp(peakHeight - distanceFromPeak, minGroundHeight, maxGroundHeight);
          setGroundHeight(start + offset, targetHeight);
        }

        return start + totalLength;
      }

      function buildDevelopmentTerrain() {
        let cursor = introEnd;

        while (cursor < developmentEnd) {
          if (random() < 0.44) {
            cursor = buildStair(cursor, 4 + Math.floor(random() * 2), 2 + Math.floor(random() * 2));
          } else {
            const sectionEnd = Math.min(developmentEnd, cursor + 8 + Math.floor(random() * 10));
            buildWaveSection(cursor, sectionEnd, 4);
            cursor = sectionEnd;
          }
        }
      }

      // Ten: climax con crepacci e piattaforme, ma senza muri verticali insuperabili.
      function buildClimaxTerrain() {
        let cursor = developmentEnd;

        while (cursor < climaxEnd - 4) {
          const pattern = pick(['wave', 'wave', 'stair', 'gap']);

          if (pattern === 'gap' && cursor < climaxEnd - 12) {
            const approachEnd = Math.min(cursor + 3, climaxEnd - 8);
            buildWaveSection(cursor, approachEnd, maxGroundHeight);

            const gapStart = approachEnd;
            const gapLength = 2 + Math.floor(random() * (2 + Math.floor(progress * 2)));

            for (let column = gapStart; column < gapStart + gapLength; column += 1) {
              groundHeights[column] = null;
            }

            gapZones.push({ start: gapStart, length: gapLength });
            cursor = gapStart + gapLength;
            currentGroundHeight = clamp(currentGroundHeight - 1, minGroundHeight, maxGroundHeight);

            for (let column = cursor; column < Math.min(cursor + 3, climaxEnd); column += 1) {
              setGroundHeight(column, currentGroundHeight);
            }

            cursor += 3;
          } else if (pattern === 'stair') {
            cursor = buildStair(cursor, 4 + Math.floor(random() * 2), 3);
          } else {
            const sectionEnd = Math.min(climaxEnd, cursor + 7 + Math.floor(random() * 8));
            buildWaveSection(cursor, sectionEnd, maxGroundHeight);
            cursor = sectionEnd;
          }
        }
      }

      function normalizeGroundHeights() {
        for (let column = 1; column < finalStart; column += 1) {
          if (groundHeights[column] === null || groundHeights[column - 1] === null) {
            continue;
          }

          groundHeights[column] = clamp(groundHeights[column], groundHeights[column - 1] - 1, groundHeights[column - 1] + 1);
        }

        groundHeights[finalStart - 1] = minGroundHeight;

        for (let column = finalStart - 2; column >= 0; column -= 1) {
          if (groundHeights[column] === null || groundHeights[column + 1] === null) {
            continue;
          }

          groundHeights[column] = clamp(groundHeights[column], groundHeights[column + 1] - 1, groundHeights[column + 1] + 1);
        }
      }

      function rebuildTerrainFromHeights() {
        for (let column = 0; column < width; column += 1) {
          if (column >= finalStart) {
            fillGroundColumn(column, minGroundHeight);
          } else if (groundHeights[column] === null) {
            clearColumn(column);
          } else {
            fillGroundColumn(column, groundHeights[column]);
          }
        }
      }

      function findPeaks(start, end) {
        const peaks = [];

        for (let column = start + 2; column < end - 2; column += 1) {
          const height = groundHeights[column];
          const left = groundHeights[column - 1];
          const right = groundHeights[column + 1];

          if (height !== null && left !== null && right !== null && height >= 4 && height >= left && height >= right && (height > left || height > right)) {
            peaks.push(column);
          }
        }

        return peaks;
      }

      function findValleys(start, end) {
        const foundValleys = [];

        for (let column = start + 3; column < end - 3; column += 1) {
          const height = groundHeights[column];

          if (
            height === minGroundHeight
            && groundHeights[column - 2] !== null
            && groundHeights[column + 2] !== null
            && groundHeights[column - 2] > height
            && groundHeights[column + 2] > height
          ) {
            foundValleys.push(column);
          }
        }

        return foundValleys;
      }

      function buildAirPlatforms() {
        gapZones.forEach((gap) => {
          const platformRow = 3;
          const platformStart = gap.start;
          const platformLength = Math.max(3, gap.length + 1);

          placeBrickRow(platformRow, platformStart, platformLength, 3);
          placeCoins(platformRow - 1, platformStart + 1, Math.max(1, platformLength - 2));
          airPlatforms.push({
            start: platformStart,
            length: platformLength,
            row: platformRow,
            center: platformStart + Math.floor(platformLength / 2)
          });
        });
      }

      function addRouteCoins() {
        for (let column = introEnd + 4; column < finalStart - 8; column += 8 + Math.floor(random() * 8)) {
          const surfaceRow = getSurfaceRow(column);

          if (surfaceRow !== null && canPlace(surfaceRow - 2, column)) {
            map[surfaceRow - 2][column] = 4;
          }
        }
      }

      function addIntroObjects() {
        const prizeColumn = Math.floor(introEnd * 0.38);
        placeTile(4, prizeColumn, 10);
        placeGroundEnemy(Math.floor(introEnd * 0.72), 7, 1, true);
      }

      function addTacticalEnemies() {
        const phase2Peaks = findPeaks(introEnd, developmentEnd);
        const phase3Peaks = findPeaks(developmentEnd, climaxEnd);
        const ambushValleys = findValleys(introEnd, climaxEnd);

        phase2Peaks.forEach((column, index) => {
          if (index % 3 === 0) {
            placeGroundEnemy(column, 8, 8);
          }
        });

        phase3Peaks.forEach((column, index) => {
          if (index % 2 === 0) {
            placeGroundEnemy(column, level >= 10 && random() < 0.65 + progress * 0.2 ? 9 : 8, 8);
          }
        });

        ambushValleys.forEach((column, index) => {
          if (index % 3 === 0) {
            placeGroundEnemy(column, 7, 8);
          }
        });

        for (let column = introEnd + 10; column < developmentEnd - 4; column += 24 + Math.floor(random() * 8)) {
          placeGroundEnemy(column, 7, 8);
          placeGroundEnemy(column + 2, 7, 0, true);
        }

        airPlatforms.forEach((platform, index) => {
          const enemyType = level >= 10 && index % 2 === 0 ? 9 : 7;
          placePlatformEnemy(platform.row, platform.center, enemyType, 8, true);
        });
      }

      function placeMandatorySpecialCoins() {
        const introCoinColumn = clamp(Math.floor(introEnd * 0.52), 4, introEnd - 4);
        placeSpecialCoin(3, introCoinColumn);

        const hillColumn = findPeaks(introEnd, developmentEnd)[0] || Math.floor((introEnd + developmentEnd) / 2);
        placeSpecialCoin(getSurfaceRow(hillColumn) - 2, hillColumn);

        const hiddenPlatform = [...airPlatforms].reverse().find((platform) => platform.center < finalStart - 4);
        if (hiddenPlatform) {
          placeSpecialCoin(Math.max(0, hiddenPlatform.row - 2), hiddenPlatform.center);
        } else {
          const fallbackColumn = clamp(Math.floor(width * 0.72), developmentEnd + 4, finalStart - 8);
          placeSpecialCoin(getSurfaceRow(fallbackColumn) - 4, fallbackColumn);
        }

        while (usedSpecialColumns.size < 3) {
          const fallbackColumn = clamp(8 + usedSpecialColumns.size * Math.floor(finalStart / 4), 8, finalStart - 8);
          placeSpecialCoin(getSurfaceRow(fallbackColumn) - 3, fallbackColumn);
        }
      }

      function clearFinalZone() {
        for (let column = finalStart; column < width; column += 1) {
          fillGroundColumn(column, minGroundHeight);
          clearAirColumn(column);
        }

        for (let column = finalStart - 2; column < width; column += 1) {
          const surfaceRow = getSurfaceRow(column) ?? mapHeight;

          for (let row = 0; row < surfaceRow; row += 1) {
            if (map[row][column] === 3 || map[row][column] === 4 || map[row][column] === 6 || map[row][column] === 7 || map[row][column] === 8 || map[row][column] === 9 || map[row][column] === 10) {
              map[row][column] = 0;
            }
          }
        }
      }

      buildIntroTerrain();
      buildDevelopmentTerrain();
      buildClimaxTerrain();
      normalizeGroundHeights();
      rebuildTerrainFromHeights();
      buildAirPlatforms();
      addIntroObjects();
      addRouteCoins();
      placeMandatorySpecialCoins();
      addTacticalEnemies();
      clearFinalZone();
      map[5][barColumn] = 5;

      return map;
    }

    function getLevelMap(levelIndex = currentLevelIndex) {
      return generateLevelStructure(levelIndex + 1);
    }

    const SPECIAL_COIN_SAVE_KEY = 'salvataggiMonete';
    let salvataggiMonete = loadSpecialCoinSaves();

    function loadSpecialCoinSaves() {
      try {
        return JSON.parse(localStorage.getItem(SPECIAL_COIN_SAVE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveSpecialCoinSaves() {
      try {
        localStorage.setItem(SPECIAL_COIN_SAVE_KEY, JSON.stringify(salvataggiMonete));
      } catch {
        // Salvataggio non disponibile.
      }
    }

    function getLevelSaveKey(levelIndex = currentLevelIndex) {
      return `livello${levelIndex}`;
    }

    function ensureLevelSpecialCoinSave(levelIndex = currentLevelIndex) {
      const key = getLevelSaveKey(levelIndex);

      if (!Array.isArray(salvataggiMonete[key])) {
        salvataggiMonete[key] = [false, false, false];
        saveSpecialCoinSaves();
      }

      return salvataggiMonete[key];
    }

    function updateSpecialCoinUI() {
      specialCoinIcons.forEach((icon, index) => {
        icon.classList.toggle('collected', currentLevelSpecialCoins[index] === true);
      });

      specialCoinCountLabel.textContent = `Monete: ${currentLevelCoinsCollected} / 3`;
    }

    function isLevelCompleted(levelIndex) {
      return localStorage.getItem(`level_${levelIndex}_completed`) === 'true';
    }

    function saveLevelCompleted(levelIndex) {
      localStorage.setItem(`level_${levelIndex}_completed`, 'true');
    }

    function isLevelUnlocked(levelIndex) {
      return levelIndex === 0 || isLevelCompleted(levelIndex - 1);
    }

    const zoneTitles = [
      "ZONA 1: L'Inizio dell'Avventura",
      'ZONA 2: I Livelli Avanzati',
      'ZONA 3: La Sfida Estrema',
      'ZONA 4: Il Gran Finale'
    ];

    function getZoneStartLevel(zoneIndex) {
      return zoneIndex * levelsPerZone;
    }

    function isZoneUnlocked(zoneIndex) {
      return zoneIndex === 0 || isLevelCompleted(getZoneStartLevel(zoneIndex) - 1);
    }

    function getUnlockedLevelsInZone(zoneIndex) {
      const start = getZoneStartLevel(zoneIndex);
      let unlockedCount = 0;

      for (let offset = 0; offset < levelsPerZone; offset += 1) {
        if (isLevelUnlocked(start + offset)) {
          unlockedCount += 1;
        }
      }

      return unlockedCount;
    }

    function showZoneHub() {
      zoneHub.classList.add('active');
      zoneLevels.classList.remove('active');
      renderZoneHub();
    }

    function openZone(zoneIndex) {
      if (!isZoneUnlocked(zoneIndex)) {
        return;
      }

      selectedZoneIndex = zoneIndex;
      selectedZonePage = 0;
      zoneHub.classList.remove('active');
      zoneLevels.classList.add('active');
      updateMainMenu();
    }

    function renderZoneHub() {
      zoneGrid.innerHTML = '';

      for (let zoneIndex = 0; zoneIndex < zoneCount; zoneIndex += 1) {
        const unlocked = isZoneUnlocked(zoneIndex);
        const zoneCard = document.createElement('button');
        zoneCard.className = 'zone-card';
        zoneCard.type = 'button';
        zoneCard.disabled = !unlocked;
        zoneCard.innerHTML = `
          <span class="zone-card-title">ZONA ${zoneIndex + 1}</span>
          <span class="zone-card-subtitle">Livelli ${getZoneStartLevel(zoneIndex) + 1}-${getZoneStartLevel(zoneIndex) + levelsPerZone}</span>
          <span class="zone-progress">Livelli sbloccati: ${getUnlockedLevelsInZone(zoneIndex)} / ${levelsPerZone}</span>
          ${unlocked ? '' : '<span class="level-lock">🔒</span>'}
        `;

        zoneCard.addEventListener('click', () => openZone(zoneIndex));
        zoneGrid.appendChild(zoneCard);
      }
    }

    function updateMainMenu() {
      renderZoneHub();
      const totalZonePages = Math.ceil(levelsPerZone / levelsPerZonePage);
      const zoneStart = getZoneStartLevel(selectedZoneIndex);
      const firstLevelIndex = zoneStart + selectedZonePage * levelsPerZonePage;
      const lastLevelIndex = Math.min(firstLevelIndex + levelsPerZonePage, zoneStart + levelsPerZone);

      levelGrid.innerHTML = '';
      selectedZoneTitle.textContent = zoneTitles[selectedZoneIndex];
      zonePageLabel.textContent = `${selectedZonePage + 1} / ${totalZonePages}`;
      prevZonePageButton.disabled = selectedZonePage === 0;
      nextZonePageButton.disabled = selectedZonePage >= totalZonePages - 1;

      for (let levelIndex = firstLevelIndex; levelIndex < lastLevelIndex; levelIndex += 1) {
        const unlocked = isLevelUnlocked(levelIndex);
        const levelSave = ensureLevelSpecialCoinSave(levelIndex);
        const card = document.createElement('button');
        card.className = 'level-card';
        card.classList.toggle('locked', !unlocked);
        card.type = 'button';
        card.disabled = !unlocked;
        card.innerHTML = `
          <span class="level-number">${levelIndex + 1}</span>
          ${unlocked ? '' : '<span class="level-lock">🔒</span>'}
          <span class="level-card-coins">
            ${levelSave.map((collected) => `<img class="${collected ? 'collected' : ''}" src="assets/moneta.png" alt="">`).join('')}
          </span>
        `;

        card.addEventListener('click', () => {
          if (unlocked) {
            startMenuLevel(levelIndex);
          }
        });

        levelGrid.appendChild(card);
      }
    }

    function showMainMenu() {
      mainMenu.style.display = 'flex';
      coinCounter.style.display = 'none';
      document.getElementById('special-coins').style.display = 'none';
      updatePauseButtonVisibility();
      showZoneHub();
      updateMainMenu();
    }

    function hideMainMenu() {
      mainMenu.style.display = 'none';
      coinCounter.style.display = 'flex';
      document.getElementById('special-coins').style.display = 'flex';
      updatePauseButtonVisibility();
    }

    function getTileTexture(map, tileType, row, column) {
      if (tileType === 3 || tileType === 10) {
        return tileTextures.brick;
      }

      const rowData = map[row];
      const hasSameLeft = rowData[column - 1] === tileType;
      const hasSameRight = rowData[column + 1] === tileType;

      if (!hasSameLeft && !hasSameRight) {
        return tileType === 1 ? tileTextures.grassSingle : tileTextures.dirtSingle;
      }

      if (!hasSameLeft) {
        return tileType === 1 ? tileTextures.grassLeft : tileTextures.dirtLeft;
      }

      if (!hasSameRight) {
        return tileType === 1 ? tileTextures.grassRight : tileTextures.dirtRight;
      }

      return tileType === 1 ? tileTextures.grassCenter : tileTextures.dirtCenter;
    }

    function trackLevelObject(mesh) {
      levelObjects.push(mesh);
      return mesh;
    }

    function createBounds(x, y, width, height) {
      return {
        left: x - width / 2,
        right: x + width / 2,
        top: y + height / 2,
        bottom: y - height / 2
      };
    }

    function createCiapetBounds(x, meshY, width = shooterHitboxWidth, height = shooterHitboxHeight) {
      const hitboxCenterY = meshY - shooterHeight / 2 + height / 2 + shooterHitboxBasePadding;
      return createBounds(x, hitboxCenterY, width, height);
    }

    function clearCurrentLevel() {
      for (const mesh of levelObjects) {
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }

      levelObjects.length = 0;
      for (const helper of blockHitboxHelpers) {
        scene.remove(helper);
        helper.geometry.dispose();
        helper.material.dispose();
      }
      blockHitboxHelpers.length = 0;
      collidableObjects.length = 0;
      coins.length = 0;
      specialCoins.length = 0;
      enemies.length = 0;
      projectiles.length = 0;
      for (const particle of dustParticles) {
        scene.remove(particle.mesh);
        particle.mesh.geometry.dispose();
        particle.mesh.material.dispose();
      }
      for (const enemy of enemies) {
        disposeEnemyHitboxDebug(enemy);
      }
      dustParticles.length = 0;
      targetBar = null;
    }

    function getTileCenterY(map, row) {
      return levelBottom + (map.length - 1 - row) * tileSize + tileSize / 2;
    }

    function getLevelSpawnPosition(map) {
      for (let row = 0; row < map.length; row += 1) {
        const tileType = map[row][0];

        if (tileType === 1 || tileType === 2) {
          const tileTop = getTileCenterY(map, row) + tileSize / 2;
          return {
            x: tileSize / 2,
            y: tileTop + getPlayerHitboxHeight() / 2 - getPlayerPhysicsVerticalOffset()
          };
        }
      }

      return {
        x: tileSize / 2,
        y: levelBottom + getPlayerHitboxHeight() / 2 - getPlayerPhysicsVerticalOffset()
      };
    }

    function getBrickPlatformInfo(map, enemyRow, enemyColumn) {
      const platformRow = enemyRow + 1;

      if (!map[platformRow] || map[platformRow][enemyColumn] !== 3) {
        return null;
      }

      let start = enemyColumn;
      let end = enemyColumn;

      while (start > 0 && map[platformRow][start - 1] === 3) {
        start -= 1;
      }

      while (end < map[platformRow].length - 1 && map[platformRow][end + 1] === 3) {
        end += 1;
      }

      return {
        row: platformRow,
        start,
        end,
        length: end - start + 1
      };
    }

    function generateLevel(map = getLevelMap(currentLevelIndex)) {
      currentLevelCoinsCollected = 0;
      currentLevelSpecialCoins = [false, false, false];
      let specialCoinIndex = 0;

      if (player) {
        const spawnPosition = getLevelSpawnPosition(map);
        player.position.set(spawnPosition.x, spawnPosition.y, 0);
        playerVelocity.set(0, 0);
        playerFacingDirection = 1;
        isGrounded = false;
        jumpRequested = false;
        maxCameraX = spawnPosition.x;
        camera.position.x = maxCameraX;
        updatePlayerVisualScale();
        updatePlayerHitbox();
      }

      for (let row = 0; row < map.length; row += 1) {
        for (let column = 0; column < map[row].length; column += 1) {
          const tileType = map[row][column];

          if (tileType === 0) {
            continue;
          }

          const x = column * tileSize + tileSize / 2;
          const y = getTileCenterY(map, row);

          if (tileType === 4) {
            const geometry = new THREE.PlaneGeometry(coinSize, coinSize);
            const material = new THREE.MeshBasicMaterial({
              map: coinTexture,
              transparent: true,
              alphaTest: 0.1
            });
            const coin = new THREE.Mesh(geometry, material);
            coin.position.set(x, y, 0.1);
            scene.add(trackLevelObject(coin));

            coins.push({
              mesh: coin,
              ...createBounds(x, y, coinSize * 0.82, coinSize * 0.82)
            });
            continue;
          }

          if (tileType === 6) {
            const currentSpecialCoinIndex = specialCoinIndex;
            specialCoinIndex += 1;

            const geometry = new THREE.PlaneGeometry(specialCoinSize, specialCoinSize);
            const material = new THREE.MeshBasicMaterial({
              map: specialCoinTexture,
              transparent: true,
              alphaTest: 0.1
            });
            const specialCoin = new THREE.Mesh(geometry, material);
            specialCoin.position.set(x, y, 0.15);
            scene.add(trackLevelObject(specialCoin));

            specialCoins.push({
              mesh: specialCoin,
              index: currentSpecialCoinIndex,
              ...createBounds(x, y, specialCoinSize * 0.82, specialCoinSize * 0.82)
            });
            continue;
          }

          if (tileType === 5) {
            const geometry = new THREE.PlaneGeometry(barWidth, barHeight);
            const material = new THREE.MeshBasicMaterial({
              map: barTexture,
              transparent: true,
              alphaTest: 0.1
            });
            const bar = new THREE.Mesh(geometry, material);
            const barY = y + barHeight / 2 - tileSize / 2;
            bar.position.set(x, barY, 0.2);
            scene.add(trackLevelObject(bar));

            targetBar = {
              mesh: bar,
              ...createBounds(x, barY, barWidth * 0.9, barHeight * 0.9)
            };
            continue;
          }

          if (tileType === 7 || tileType === 8) {
            const platformInfo = getBrickPlatformInfo(map, row, column);
            const enemyType = tileType === 7 && (!platformInfo || platformInfo.length >= 3) ? 'mobile' : 'fermo';
            const enemyDirection = enemyType === 'mobile' && column % 2 === 0 ? -1 : 1;
            const enemyTexture = createEnemyTexture(enemyTextures.idle, enemyDirection);

            const geometry = new THREE.PlaneGeometry(enemyWidth, enemyHeight);
            const material = new THREE.MeshBasicMaterial({
              map: enemyTexture,
              transparent: true,
              alphaTest: 0.1
            });
            const enemyMesh = new THREE.Mesh(geometry, material);
            const enemyY = y - tileSize / 2 + enemyHeight / 2 + 0.04;
            enemyMesh.position.set(x, enemyY, 0.25);
            scene.add(trackLevelObject(enemyMesh));

            enemies.push({
              mesh: enemyMesh,
              type: enemyType,
              direction: enemyDirection,
              isDead: false,
              animationTimer: 0,
              animationFrame: 0,
              platformBounds: platformInfo && enemyType === 'mobile' ? {
                left: platformInfo.start * tileSize,
                right: (platformInfo.end + 1) * tileSize
              } : null,
              currentTextureKey: `idle-${enemyDirection}`,
              velocityY: 0,
              deathVelocityY: 0,
              bounds: createBounds(x, enemyY, enemyHitboxWidth, enemyHitboxHeight)
            });
            continue;
          }

          if (tileType === 9) {
            const shooterDirection = -1;
            const shooterTexture = createShooterTexture(shooterTextures.idle);
            const geometry = new THREE.PlaneGeometry(shooterWidth, shooterHeight);
            const material = new THREE.MeshBasicMaterial({
              map: shooterTexture,
              transparent: true,
              alphaTest: 0.1
            });
            const shooterMesh = new THREE.Mesh(geometry, material);
            const shooterY = y - tileSize / 2 + shooterHeight / 2 + 0.04;
            shooterMesh.position.set(x, shooterY, 0.3);
            scene.add(trackLevelObject(shooterMesh));
            const ciapetHitbox = createCiapetBounds(x, shooterY);
            let ciapetHitboxDebugMesh = null;
            let ciapetHitboxDebug = null;

            if (SHOW_DEBUG_HITBOXES) {
              ciapetHitboxDebugMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 0.05),
                new THREE.MeshBasicMaterial({ visible: false })
              );
              ciapetHitboxDebug = new THREE.BoxHelper(ciapetHitboxDebugMesh, 0xff0000);
              ciapetHitboxDebug.renderOrder = 1001;
              scene.add(ciapetHitboxDebugMesh);
              scene.add(ciapetHitboxDebug);
            }

            enemies.push({
              mesh: shooterMesh,
              type: 'shooter',
              direction: shooterDirection,
              isDead: false,
              state: 'idle',
              actionTimer: 2 + Math.random() * 2,
              reloadTimer: 0,
              shootTimer: 0,
              animationTimer: 0,
              animationFrame: 0,
              currentTextureKey: 'ciapet-idle',
              deathVelocityY: 0,
              ciapetHitboxWidth: shooterHitboxWidth,
              ciapetHitboxHeight: shooterHitboxHeight,
              ciapetHitbox,
              ciapetHitboxDebugMesh,
              ciapetHitboxDebug,
              bounds: ciapetHitbox
            });
            continue;
          }

          const geometry = new THREE.PlaneGeometry(tileSize, tileSize);
          const material = new THREE.MeshBasicMaterial({
            map: getTileTexture(map, tileType, row, column),
            transparent: true,
            alphaTest: 0.1
          });
          const tile = new THREE.Mesh(geometry, material);
          tile.position.set(x, y, 0);
          scene.add(trackLevelObject(tile));

          const collidableObject = {
            mesh: tile,
            type: tileType,
            used: false,
            active: true,
            ...createBounds(x, y, tileSize, tileSize)
          };

          if (SHOW_DEBUG_HITBOXES) {
            collidableObject.debugHelper = new THREE.BoxHelper(tile, 0x00ff66);
            collidableObject.debugHelper.visible = false;
            collidableObject.debugHelper.renderOrder = 999;
            scene.add(collidableObject.debugHelper);
            blockHitboxHelpers.push(collidableObject.debugHelper);
          }

          collidableObjects.push(collidableObject);
        }
      }

      updateSpecialCoinUI();
    }

    let player;
    let currentPlayerTexture;
    let playerFacingDirection = 1;

    function loadPlayerTexture(path) {
      const texture = loadTexture(path, true, (loadedTexture) => {
        loadedTexture.userData.aspectRatio = loadedTexture.image.width / loadedTexture.image.height;

        if (loadedTexture === currentPlayerTexture) {
          updatePlayerVisualScale();
        }
      });
      texture.userData.aspectRatio = 1;
      return texture;
    }

    const playerTextures = {
      gioFermo: loadPlayerTexture('assets/giovannino_idle.png'),
      gioSalto: loadPlayerTexture('assets/giovannino_jump.png'),
      gioCorsa1: loadPlayerTexture('assets/giovannino_run1.png'),
      gioCorsa2: loadPlayerTexture('assets/giovannino_run2.png')
    };
    const runAnimationFrameDelay = 8;
    let animationFrame = 0;
    currentPlayerTexture = playerTextures.gioFermo;

    const playerGeometry = new THREE.PlaneGeometry(playerSize, playerSize);
    const playerMaterial = new THREE.MeshBasicMaterial({
      map: currentPlayerTexture,
      transparent: true,
      alphaTest: 0.1
    });
    player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.set(2.5, -5 + playerSize / 2, 0);
    scene.add(player);
    const playerPhysicsBox = new THREE.Box2();
    const playerHitbox = playerPhysicsBox;
    const playerPhysicsDebugMesh = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 0.05),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    const playerHitboxDebug = new THREE.BoxHelper(playerPhysicsDebugMesh, 0xff0000);
    playerHitboxDebug.visible = SHOW_DEBUG_HITBOXES;
    playerHitboxDebug.renderOrder = 1000;
    scene.add(playerPhysicsDebugMesh);
    scene.add(playerHitboxDebug);
    updatePlayerVisualScale();

    const clock = new THREE.Clock();
    const keys = {
      left: false,
      right: false
    };
    const playerVelocity = new THREE.Vector2(0, 0);
    let isGrounded = true;
    let jumpRequested = false;
    let mobileInputX = 0;
    let activeJoystickPointerId = null;
    const joystickMaxOffset = 40;
    const joystickDeadZone = 5;

    function setMovementKey(code, isPressed) {
      if (code === 'ArrowLeft' || code === 'KeyA') {
        keys.left = isPressed;
        return true;
      }

      if (code === 'ArrowRight' || code === 'KeyD') {
        keys.right = isPressed;
        return true;
      }

      return false;
    }

    function handleKeyDown(event) {
      if (event.code === 'KeyP' || event.code === 'Escape') {
        togglePause(event);
        return;
      }

      if (isPaused) {
        return;
      }

      const handledMovement = setMovementKey(event.code, true);

      if (event.code === 'Space') {
        if (!event.repeat) {
          jumpRequested = true;
        }
        event.preventDefault();
        return;
      }

      if (handledMovement) {
        event.preventDefault();
      }
    }

    function handleKeyUp(event) {
      if (setMovementKey(event.code, false)) {
        event.preventDefault();
      }
    }

    function setJoystickOffset(offsetX) {
      const clampedOffset = Math.max(-joystickMaxOffset, Math.min(joystickMaxOffset, offsetX));
      joystickHandle.style.transform = `translate(calc(-50% + ${clampedOffset}px), -50%)`;
      mobileInputX = Math.abs(clampedOffset) < joystickDeadZone ? 0 : clampedOffset / joystickMaxOffset;
    }

    function resetJoystick() {
      activeJoystickPointerId = null;
      setJoystickOffset(0);
    }

    function updateJoystickFromPointer(event) {
      event.preventDefault();
      const baseRect = joystickBase.getBoundingClientRect();
      const baseCenterX = baseRect.left + baseRect.width / 2;
      setJoystickOffset(event.clientX - baseCenterX);
    }

    function handleJoystickPointerDown(event) {
      event.preventDefault();
      activeJoystickPointerId = event.pointerId;
      joystickBase.setPointerCapture(event.pointerId);
      updateJoystickFromPointer(event);
    }

    function handleJoystickPointerMove(event) {
      if (event.pointerId !== activeJoystickPointerId) {
        return;
      }

      updateJoystickFromPointer(event);
    }

    function handleJoystickPointerUp(event) {
      if (event.pointerId !== activeJoystickPointerId) {
        return;
      }

      event.preventDefault();
      resetJoystick();
    }

    function handleMobileJump(event) {
      event.preventDefault();

      if (!isGameStarted || isChangingLevel || isGameCompleted || !isGrounded) {
        return;
      }

      spawnJumpDust();
      playerVelocity.y = jumpVelocity;
      isGrounded = false;
      jumpRequested = false;
    }

    function triggerScreenShake(duration, intensity) {
      screenShakeDuration = duration;
      screenShakeTimer = duration;
      screenShakeIntensity = intensity;
    }

    function triggerDamageFlash() {
      damageFlashTimer = 0.1;
      playerMaterial.color.setHex(0xff0000);
    }

    function updateDamageFlash(deltaTime) {
      if (damageFlashTimer <= 0) {
        return;
      }

      damageFlashTimer -= deltaTime;

      if (damageFlashTimer <= 0) {
        playerMaterial.color.setHex(0xffffff);
      }
    }

    function createDustParticle(x, y, velocityX, velocityY, size = 0.12) {
      const geometry = new THREE.PlaneGeometry(size, size);
      const material = new THREE.MeshBasicMaterial({
        color: 0xd8d8d8,
        transparent: true,
        opacity: 0.72,
        depthWrite: false
      });
      const particle = new THREE.Mesh(geometry, material);
      particle.position.set(x, y, 0.65);
      scene.add(particle);

      dustParticles.push({
        mesh: particle,
        velocityX,
        velocityY,
        life: 0.3,
        maxLife: 0.3
      });
    }

    function spawnRunDust() {
      const footY = playerHitbox.min.y + 0.08;
      const originX = player.position.x - playerFacingDirection * getPlayerHitboxWidth() * 0.36;

      for (let index = 0; index < 3; index += 1) {
        createDustParticle(
          originX - playerFacingDirection * index * 0.08,
          footY + index * 0.02,
          -playerFacingDirection * (0.9 + index * 0.22),
          0.55 + index * 0.12,
          0.1 + index * 0.025
        );
      }
    }

    function spawnJumpDust() {
      updatePlayerHitbox();
      const footY = playerHitbox.min.y + 0.06;

      for (let index = 0; index < 6; index += 1) {
        const angle = (Math.PI * 2 * index) / 6;
        createDustParticle(
          player.position.x + Math.cos(angle) * 0.18,
          footY,
          Math.cos(angle) * 1.6,
          Math.max(0.35, Math.sin(angle) * 0.8),
          0.14
        );
      }
    }

    function updateDustParticles(deltaTime) {
      for (let index = dustParticles.length - 1; index >= 0; index -= 1) {
        const particle = dustParticles[index];

        particle.life -= deltaTime;
        particle.mesh.position.x += particle.velocityX * deltaTime;
        particle.mesh.position.y += particle.velocityY * deltaTime;
        particle.velocityY += gravity * 0.18 * deltaTime;

        const lifeRatio = Math.max(particle.life / particle.maxLife, 0);
        particle.mesh.material.opacity = 0.72 * lifeRatio;
        particle.mesh.scale.setScalar(Math.max(lifeRatio, 0.01));

        if (particle.life > 0) {
          continue;
        }

        scene.remove(particle.mesh);
        particle.mesh.geometry.dispose();
        particle.mesh.material.dispose();
        dustParticles.splice(index, 1);
      }
    }

    function getPlayerVisualWidth() {
      return playerSize * Math.abs(player.scale.x);
    }

    function getPlayerVisualHeight() {
      return playerSize * Math.abs(player.scale.y);
    }

    function getPlayerHitboxWidth() {
      return getPlayerVisualWidth() * 0.6;
    }

    function getPlayerHitboxHeight() {
      return getPlayerVisualHeight() * 0.95;
    }

    function getPlayerPhysicsVerticalOffset() {
      return getPlayerVisualHeight() * 0.025;
    }

    function updatePlayerHitbox() {
      const halfWidth = getPlayerHitboxWidth() / 2;
      const halfHeight = getPlayerHitboxHeight() / 2;
      const verticalSkinOffset = getPlayerPhysicsVerticalOffset();

      playerPhysicsBox.min.set(player.position.x - halfWidth, player.position.y + verticalSkinOffset - halfHeight);
      playerPhysicsBox.max.set(player.position.x + halfWidth, player.position.y + verticalSkinOffset + halfHeight);
      updatePlayerHitboxDebug();
    }

    function updatePlayerHitboxDebug() {
      playerHitboxDebug.visible = SHOW_DEBUG_HITBOXES;

      if (!SHOW_DEBUG_HITBOXES) {
        return;
      }

      const width = playerPhysicsBox.max.x - playerPhysicsBox.min.x;
      const height = playerPhysicsBox.max.y - playerPhysicsBox.min.y;
      playerPhysicsDebugMesh.position.set(
        (playerPhysicsBox.min.x + playerPhysicsBox.max.x) / 2,
        (playerPhysicsBox.min.y + playerPhysicsBox.max.y) / 2,
        0.72
      );
      playerPhysicsDebugMesh.scale.set(width, height, 1);
      playerPhysicsDebugMesh.updateMatrixWorld(true);
      playerHitboxDebug.update();
    }

    function getPlayerBoundsFromHitbox() {
      return {
        left: playerPhysicsBox.min.x,
        right: playerPhysicsBox.max.x,
        top: playerPhysicsBox.max.y,
        bottom: playerPhysicsBox.min.y
      };
    }

    function hasAABBOverlap(a, b) {
      return a.right > b.left && a.left < b.right && a.top > b.bottom && a.bottom < b.top;
    }

    function isBlockUnderPlayerFeet(playerBounds, object) {
      const footTolerance = 0.08;
      const horizontalOverlap = playerBounds.right > object.left + 0.05 && playerBounds.left < object.right - 0.05;
      const blockIsBelowFeet = object.top <= playerBounds.bottom + footTolerance;

      return horizontalOverlap && blockIsBelowFeet;
    }

    function hasGroundSupport() {
      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();
      const supportY = playerBounds.bottom - 0.06;

      return collidableObjects.some((object) => (
        object.active &&
        playerBounds.right > object.left + 0.06 &&
        playerBounds.left < object.right - 0.06 &&
        supportY <= object.top &&
        supportY >= object.top - 0.16
      ));
    }

    function resolveHorizontalCollisions() {
      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();
      const footTolerance = 0.08;

      for (const object of collidableObjects) {
        if (!object.active) {
          continue;
        }

        if (!hasAABBOverlap(playerBounds, object)) {
          continue;
        }

        if (isBlockUnderPlayerFeet(playerBounds, object)) {
          continue;
        }

        if (object.top <= playerBounds.bottom + footTolerance) {
          continue;
        }

        if (playerVelocity.x > 0) {
          player.position.x = object.left - getPlayerHitboxWidth() / 2;
        } else if (playerVelocity.x < 0) {
          player.position.x = object.right + getPlayerHitboxWidth() / 2;
        }

        updatePlayerHitbox();
        playerVelocity.x = 0;
        return;
      }
    }

    function activatePrizeBlock(object) {
      if (object.type !== 10 || object.used) {
        return;
      }

      object.used = true;
      object.type = 3;
      coinCount += 1;
      updateCoinCounter();
      object.mesh.material.map = null;
      object.mesh.material.color.set(0x8f8f8f);
      object.mesh.material.needsUpdate = true;
    }

    function resolveVerticalCollisions(previousBottom, previousTop) {
      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();
      const halfHeight = getPlayerHitboxHeight() / 2;
      const verticalOffset = getPlayerPhysicsVerticalOffset();

      for (const object of collidableObjects) {
        if (!object.active) {
          continue;
        }

        if (!hasAABBOverlap(playerBounds, object)) {
          continue;
        }

        const isLanding = playerVelocity.y <= 0 && previousBottom >= object.top;
        const isHeadHit = playerVelocity.y > 0 && previousTop <= object.bottom;

        if (isLanding) {
          player.position.y = object.top + halfHeight - verticalOffset;
          updatePlayerHitbox();
          playerVelocity.y = 0;
          isGrounded = true;
          return;
        }

        if (isHeadHit) {
          activatePrizeBlock(object);
          player.position.y = object.bottom - halfHeight - verticalOffset;
          updatePlayerHitbox();
          playerVelocity.y = -0.01;
          return;
        }
      }
    }

    function clampPlayerToLevelStart() {
      if (player.position.x < 0) {
        player.position.x = 0;
        playerVelocity.x = Math.max(playerVelocity.x, 0);
        updatePlayerHitbox();
      }
    }

    function updateCoinCounter() {
      coinCountLabel.textContent = coinCount;
    }

    function updatePauseButtonVisibility() {
      pauseButton.style.display = isGameStarted && !isChangingLevel && !isGameCompleted ? 'block' : 'none';
    }

    function pauseGame(event) {
      if (event) {
        event.preventDefault();
      }

      if (!isGameStarted || isChangingLevel || isGameCompleted || isPaused) {
        return;
      }

      isPaused = true;
      playerVelocity.set(0, 0);
      pauseMenu.style.display = 'flex';
      updatePauseButtonVisibility();
    }

    function resumeGame(event) {
      if (event) {
        event.preventDefault();
      }

      isPaused = false;
      pauseMenu.style.display = 'none';
      updatePauseButtonVisibility();
    }

    function restartFromPause(event) {
      if (event) {
        event.preventDefault();
      }

      isPaused = false;
      pauseMenu.style.display = 'none';
      restartCurrentLevel();
      updatePauseButtonVisibility();
    }

    function returnToMainMenuFromPause(event) {
      if (event) {
        event.preventDefault();
      }

      isPaused = false;
      pauseMenu.style.display = 'none';
      clearCurrentLevel();
      isChangingLevel = false;
      isGameCompleted = false;
      isGameStarted = false;
      playerVelocity.set(0, 0);
      updatePauseButtonVisibility();
      showMainMenu();
    }

    function togglePause(event) {
      if (isPaused) {
        resumeGame(event);
      } else {
        pauseGame(event);
      }
    }

    function showLevelMessage(text) {
      if (levelGateMessageTimer) {
        clearTimeout(levelGateMessageTimer);
        levelGateMessageTimer = null;
      }

      levelMessage.textContent = text;
      levelMessage.style.display = 'flex';
    }

    function hideLevelMessage() {
      if (levelGateMessageTimer) {
        clearTimeout(levelGateMessageTimer);
        levelGateMessageTimer = null;
      }

      levelMessage.style.display = 'none';
    }

    function showTemporaryLevelMessage(text, duration = 2600) {
      if (levelGateMessageTimer) {
        return;
      }

      showLevelMessage(text);
      levelGateMessageTimer = setTimeout(() => {
        hideLevelMessage();
        levelGateMessageTimer = null;
      }, duration);

    function showWinMenu() {
      isPaused = false;
      pauseMenu.style.display = 'none';
      updatePauseButtonVisibility();
      winNextButton.disabled = currentLevelIndex >= totalLevels - 1;
      winMenu.style.display = 'flex';
      coinCounter.style.display = 'none';
      document.getElementById('special-coins').style.display = 'none';
    }

    function hideWinMenu() {
      winMenu.style.display = 'none';
    }

    function showGameOverMenu() {
      isPaused = false;
      pauseMenu.style.display = 'none';
      isGameStarted = false;
      isChangingLevel = false;
      playerVelocity.set(0, 0);
      updatePauseButtonVisibility();
      gameOverMenu.style.display = 'flex';
      coinCounter.style.display = 'none';
      document.getElementById('special-coins').style.display = 'none';
    }

    function hideGameOverMenu() {
      gameOverMenu.style.display = 'none';
    }

    function resetPlayerPosition() {
      const spawnPosition = getLevelSpawnPosition(getLevelMap(currentLevelIndex));

      player.position.set(spawnPosition.x, spawnPosition.y, 0);
      playerVelocity.set(0, 0);
      playerFacingDirection = 1;
      isGrounded = false;
      jumpRequested = false;
      maxCameraX = spawnPosition.x;
      camera.position.x = maxCameraX;
      updatePlayerVisualScale();
      updatePlayerHitbox();
    }

    function restartCurrentLevelFromGameOver() {
      hideGameOverMenu();
      clearCurrentLevel();
      isGameStarted = true;
      isPaused = false;
      isChangingLevel = false;
      isGameCompleted = false;
      resetPlayerPosition();
      generateLevel(getLevelMap(currentLevelIndex));
      coinCounter.style.display = 'flex';
      document.getElementById('special-coins').style.display = 'flex';
      updateSpecialCoinUI();
      updateCoinCounter();
    }

    function returnToMainMenuFromGameOver() {
      hideGameOverMenu();
      clearCurrentLevel();
      isChangingLevel = false;
      isGameCompleted = false;
      isGameStarted = false;
      isPaused = false;
      updatePauseButtonVisibility();
      showMainMenu();
    }

    function isTouchDevice() {
      return window.matchMedia('(pointer: coarse)').matches;
    }

    function isMobilePortrait() {
      return isTouchDevice() && window.innerHeight > window.innerWidth;
    }

    function requestLandscapeOrientation() {
      if (!screen.orientation || !screen.orientation.lock) {
        return;
      }

      screen.orientation.lock('landscape').catch(() => {});
    }

    function startMenuLevel(levelIndex) {
      if (!isLevelUnlocked(levelIndex)) {
        updateMainMenu();
        return;
      }

      requestLandscapeOrientation();
      clearCurrentLevel();
      currentLevelIndex = levelIndex;
      selectedMenuLevel = levelIndex;
      selectedZoneIndex = Math.floor(levelIndex / levelsPerZone);
      selectedZonePage = Math.floor((levelIndex % levelsPerZone) / levelsPerZonePage);
      isGameStarted = true;
      isPaused = false;
      isChangingLevel = false;
      isGameCompleted = false;
      hideLevelMessage();
      hideGameOverMenu();
      hideMainMenu();
      resetPlayerPosition();
      generateLevel(getLevelMap(levelIndex));
      updateSpecialCoinUI();
      updateCoinCounter();
      updatePauseButtonVisibility();
    }

    function startSelectedLevel() {
      startMenuLevel(selectedMenuLevel);
    }

    function restartCurrentLevel() {
      hideWinMenu();
      hideGameOverMenu();
      clearCurrentLevel();
      isGameStarted = true;
      isPaused = false;
      isChangingLevel = false;
      isGameCompleted = false;
      resetPlayerPosition();
      generateLevel(getLevelMap(currentLevelIndex));
      coinCounter.style.display = 'flex';
      document.getElementById('special-coins').style.display = 'flex';
      updateSpecialCoinUI();
      updateCoinCounter();
      updatePauseButtonVisibility();
    }

    function goToNextLevel() {
      if (currentLevelIndex >= totalLevels - 1) {
        return;
      }

      currentLevelIndex += 1;
      selectedMenuLevel = currentLevelIndex;
      selectedZoneIndex = Math.floor(currentLevelIndex / levelsPerZone);
      selectedZonePage = Math.floor((currentLevelIndex % levelsPerZone) / levelsPerZonePage);
      hideWinMenu();
      hideGameOverMenu();
      clearCurrentLevel();
      isGameStarted = true;
      isPaused = false;
      isChangingLevel = false;
      isGameCompleted = false;
      resetPlayerPosition();
      generateLevel(getLevelMap(currentLevelIndex));
      coinCounter.style.display = 'flex';
      document.getElementById('special-coins').style.display = 'flex';
      updateSpecialCoinUI();
      updateCoinCounter();
      updatePauseButtonVisibility();
    }

    function returnToMainMenuFromWin() {
      hideWinMenu();
      clearCurrentLevel();
      selectedMenuLevel = Math.min(currentLevelIndex + 1, totalLevels - 1);
      selectedZoneIndex = Math.floor(selectedMenuLevel / levelsPerZone);
      selectedZonePage = Math.floor((selectedMenuLevel % levelsPerZone) / levelsPerZonePage);
      isChangingLevel = false;
      isGameCompleted = false;
      isGameStarted = false;
      isPaused = false;
      updatePauseButtonVisibility();
      showMainMenu();
    }

    function collectCoins() {
      if (!isGameStarted) {
        return;
      }

      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();

      for (let index = coins.length - 1; index >= 0; index -= 1) {
        const coin = coins[index];

        if (!hasAABBOverlap(playerBounds, coin)) {
          continue;
        }

        scene.remove(coin.mesh);
        coin.mesh.geometry.dispose();
        coin.mesh.material.dispose();
        const levelObjectIndex = levelObjects.indexOf(coin.mesh);

        if (levelObjectIndex !== -1) {
          levelObjects.splice(levelObjectIndex, 1);
        }

        coins.splice(index, 1);
        coinCount += 1;
        updateCoinCounter();
      }
    }

    function collectSpecialCoins() {
      if (!isGameStarted) {
        return;
      }

      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();
      const levelSave = ensureLevelSpecialCoinSave();

      for (let index = specialCoins.length - 1; index >= 0; index -= 1) {
        const specialCoin = specialCoins[index];

        if (!hasAABBOverlap(playerBounds, specialCoin)) {
          continue;
        }

        scene.remove(specialCoin.mesh);
        specialCoin.mesh.geometry.dispose();
        specialCoin.mesh.material.dispose();
        const levelObjectIndex = levelObjects.indexOf(specialCoin.mesh);

        if (levelObjectIndex !== -1) {
          levelObjects.splice(levelObjectIndex, 1);
        }

        specialCoins.splice(index, 1);
        if (!currentLevelSpecialCoins[specialCoin.index]) {
          currentLevelSpecialCoins[specialCoin.index] = true;
          currentLevelCoinsCollected += 1;
        }
        levelSave[specialCoin.index] = true;
        saveSpecialCoinSaves();
        updateSpecialCoinUI();
      }
    }

    function updateEnemyBounds(enemy) {
      if (enemy.type === 'shooter') {
        enemy.ciapetHitbox = createCiapetBounds(
          enemy.mesh.position.x,
          enemy.mesh.position.y,
          enemy.ciapetHitboxWidth,
          enemy.ciapetHitboxHeight
        );
        enemy.bounds = enemy.ciapetHitbox;
        updateCiapetHitboxDebug(enemy);
        return;
      }

      enemy.bounds = createBounds(
        enemy.mesh.position.x,
        enemy.mesh.position.y,
        enemyHitboxWidth,
        enemyHitboxHeight
      );
    }

    function updateCiapetHitboxDebug(enemy) {
      if (!enemy.ciapetHitboxDebug || !enemy.ciapetHitboxDebugMesh) {
        return;
      }

      enemy.ciapetHitboxDebug.visible = SHOW_DEBUG_HITBOXES && enemy.active && !enemy.isDead;

      if (!enemy.ciapetHitboxDebug.visible) {
        return;
      }

      const width = enemy.ciapetHitbox.right - enemy.ciapetHitbox.left;
      const height = enemy.ciapetHitbox.top - enemy.ciapetHitbox.bottom;
      enemy.ciapetHitboxDebugMesh.position.set(
        (enemy.ciapetHitbox.left + enemy.ciapetHitbox.right) / 2,
        (enemy.ciapetHitbox.bottom + enemy.ciapetHitbox.top) / 2,
        0.78
      );
      enemy.ciapetHitboxDebugMesh.scale.set(width, height, 1);
      enemy.ciapetHitboxDebugMesh.updateMatrixWorld(true);
      enemy.ciapetHitboxDebug.update();
    }

    function disposeEnemyHitboxDebug(enemy) {
      if (enemy.ciapetHitboxDebug) {
        scene.remove(enemy.ciapetHitboxDebug);
        enemy.ciapetHitboxDebug.geometry.dispose();
        enemy.ciapetHitboxDebug.material.dispose();
        enemy.ciapetHitboxDebug = null;
      }

      if (enemy.ciapetHitboxDebugMesh) {
        scene.remove(enemy.ciapetHitboxDebugMesh);
        enemy.ciapetHitboxDebugMesh.geometry.dispose();
        enemy.ciapetHitboxDebugMesh.material.dispose();
        enemy.ciapetHitboxDebugMesh = null;
      }
    }

    function isSolidAtPoint(x, y) {
      return collidableObjects.some((object) => (
        object.active &&
        x > object.left &&
        x < object.right &&
        y > object.bottom &&
        y < object.top
      ));
    }

    function wouldEnemyHitWall(enemy, nextX) {
      const nextBounds = createBounds(nextX, enemy.mesh.position.y, enemyHitboxWidth, enemyHitboxHeight);

      return collidableObjects.some((object) => object.active && hasAABBOverlap(nextBounds, object));
    }

    function createEnemyTexture(baseTexture, direction) {
      const texture = baseTexture.clone();
      texture.needsUpdate = true;
      texture.wrapS = THREE.RepeatWrapping;
      texture.repeat.x = direction === 1 ? -1 : 1;
      texture.offset.x = direction === 1 ? 1 : 0;
      return texture;
    }

    function createShooterTexture(baseTexture) {
      const texture = baseTexture.clone();
      texture.needsUpdate = true;
      texture.wrapS = THREE.RepeatWrapping;
      texture.repeat.x = -1;
      texture.offset.x = 1;
      return texture;
    }

    function setShooterTexture(enemy, texture, key) {
      if (enemy.currentTextureKey === key) {
        texture.dispose();
        return;
      }

      if (enemy.mesh.material.map) {
        enemy.mesh.material.map.dispose();
      }

      enemy.currentTextureKey = key;
      enemy.mesh.material.map = texture;
      enemy.mesh.material.needsUpdate = true;
    }

    function getProjectileSpeed() {
      return projectileBaseSpeed + (currentLevelIndex * 0.2);
    }

    function spawnProjectile(enemy) {
      const geometry = new THREE.PlaneGeometry(projectileSize, projectileSize);
      const material = new THREE.MeshBasicMaterial({
        color: 0xff5a1f,
        transparent: true,
        opacity: 0.95,
        depthWrite: false
      });
      const projectileMesh = new THREE.Mesh(geometry, material);
      const x = enemy.mesh.position.x + enemy.direction * (shooterHitboxWidth / 2 + projectileSize / 2);
      const y = enemy.mesh.position.y + shooterHitboxHeight * 0.12;

      projectileMesh.position.set(x, y, 0.55);
      scene.add(trackLevelObject(projectileMesh));

      projectiles.push({
        mesh: projectileMesh,
        velocityX: enemy.direction * getProjectileSpeed(),
        bounds: createBounds(x, y, projectileSize, projectileSize)
      });
    }

    function updateShooter(enemy, deltaTime) {
      if (enemy.state === 'idle') {
        enemy.actionTimer -= deltaTime;
        setShooterTexture(enemy, createShooterTexture(shooterTextures.idle), 'ciapet-idle');

        if (enemy.actionTimer <= 0) {
          enemy.state = 'reload';
          enemy.reloadTimer = 0.8;
          setShooterTexture(enemy, createShooterTexture(shooterTextures.reload), 'ciapet-reload');
        }

        return;
      }

      if (enemy.state === 'reload') {
        enemy.reloadTimer -= deltaTime;

        if (enemy.reloadTimer <= 0) {
          enemy.state = 'shoot';
          enemy.shootTimer = 0.25;
          setShooterTexture(enemy, createShooterTexture(shooterTextures.shoot), 'ciapet-shoot');
          spawnProjectile(enemy);
        }

        return;
      }

      if (enemy.state === 'shoot') {
        enemy.shootTimer -= deltaTime;

        if (enemy.shootTimer <= 0) {
          enemy.state = 'idle';
          enemy.actionTimer = 2 + Math.random() * 2;
          setShooterTexture(enemy, createShooterTexture(shooterTextures.idle), 'ciapet-idle');
        }
      }
    }

    function setEnemyTexture(enemy, texture, key) {
      if (enemy.currentTextureKey === key) {
        texture.dispose();
        return;
      }

      if (enemy.mesh.material.map) {
        enemy.mesh.material.map.dispose();
      }

      enemy.currentTextureKey = key;
      enemy.mesh.material.map = texture;
      enemy.mesh.material.needsUpdate = true;
    }

    function updateEnemyAnimation(enemy, deltaTime) {
      if (enemy.type === 'fermo') {
        enemy.animationTimer = 0;
        if (enemy.currentTextureKey === `idle-${enemy.direction}`) {
          return;
        }
        setEnemyTexture(enemy, createEnemyTexture(enemyTextures.idle, enemy.direction), `idle-${enemy.direction}`);
        return;
      }

      enemy.animationTimer += deltaTime;

      if (enemy.animationTimer < 0.15) {
        return;
      }

      enemy.animationTimer = 0;
      enemy.animationFrame = (enemy.animationFrame + 1) % 2;
      const frameKey = enemy.animationFrame === 0 ? 'run1' : 'run2';
      setEnemyTexture(
        enemy,
        createEnemyTexture(enemy.animationFrame === 0 ? enemyTextures.run1 : enemyTextures.run2, enemy.direction),
        `${frameKey}-${enemy.direction}`
      );
    }

    function squashEnemy(enemy) {
      enemy.isDead = true;
      enemy.active = false;
      enemy.deathMode = 'squished';
      enemy.squishTimer = 0.13;
      enemy.bounds = createBounds(enemy.mesh.position.x, enemy.mesh.position.y, 0, 0);
      if (enemy.ciapetHitboxDebug) {
        enemy.ciapetHitboxDebug.visible = false;
      }
      enemy.mesh.rotation.z = 0;
      enemy.mesh.position.y -= enemyHitboxHeight * 0.4;
      enemy.mesh.scale.y = 0.2;
      triggerScreenShake(0.12, 0.18);
    }

    function updateEnemies(deltaTime) {
      for (let index = enemies.length - 1; index >= 0; index -= 1) {
        const enemy = enemies[index];

        if (enemy.isDead) {
          if (enemy.deathMode === 'squished') {
            enemy.squishTimer -= deltaTime;

            if (enemy.squishTimer <= 0) {
              disposeEnemy(enemy);
              enemies.splice(index, 1);
            }

            continue;
          }

          enemy.deathVelocityY += gravity * deltaTime;
          enemy.mesh.position.y += enemy.deathVelocityY * deltaTime;

          if (enemy.mesh.position.y < levelBottom - 6) {
            disposeEnemy(enemy);
            enemies.splice(index, 1);
          }

          continue;
        }

        if (!enemy.active) {
          continue;
        }

        if (enemy.type === 'mobile') {
          const previousBottom = enemy.bounds.bottom;
          const nextX = enemy.mesh.position.x + enemy.direction * enemySpeed * deltaTime;
          const footX = nextX + enemy.direction * (enemyHitboxWidth / 2 + 0.08);
          const footY = enemy.bounds.bottom - 0.14;
          const isGroundAhead = isSolidAtPoint(footX, footY);
          const hitWall = wouldEnemyHitWall(enemy, nextX);

          if (!isGroundAhead || hitWall) {
            enemy.direction *= -1;
          } else {
            enemy.mesh.position.x = nextX;
          }

          enemy.velocityY = (enemy.velocityY || 0) + gravity * deltaTime;
          enemy.mesh.position.y += enemy.velocityY * deltaTime;
          updateEnemyBounds(enemy);

          for (const object of collidableObjects) {
            if (!object.active) {
              continue;
            }

            if (!hasAABBOverlap(enemy.bounds, object) || enemy.velocityY > 0 || previousBottom < object.top - 0.08) {
              continue;
            }

            enemy.mesh.position.y = object.top + enemyHitboxHeight / 2;
            enemy.velocityY = 0;
            updateEnemyBounds(enemy);
            break;
          }
        }

        if (enemy.type === 'shooter') {
          updateShooter(enemy, deltaTime);
        }

        updateEnemyBounds(enemy);

        if (enemy.type !== 'shooter') {
          updateEnemyAnimation(enemy, deltaTime);
        }
      }
    }

    function updateProjectiles(deltaTime) {
      for (let index = projectiles.length - 1; index >= 0; index -= 1) {
        const projectile = projectiles[index];

        projectile.mesh.position.x += projectile.velocityX * deltaTime;
        projectile.bounds = createBounds(
          projectile.mesh.position.x,
          projectile.mesh.position.y,
          projectileSize,
          projectileSize
        );

        const hitSolid = collidableObjects.some((object) => object.active && hasAABBOverlap(projectile.bounds, object));
        const offscreenLeft = projectile.mesh.position.x < camera.position.x + camera.left - 2;
        const offscreenRight = projectile.mesh.position.x > camera.position.x + camera.right + 2;

        if (hitSolid || offscreenLeft || offscreenRight) {
          scene.remove(projectile.mesh);
          projectile.mesh.geometry.dispose();
          projectile.mesh.material.dispose();
          const levelObjectIndex = levelObjects.indexOf(projectile.mesh);

          if (levelObjectIndex !== -1) {
            levelObjects.splice(levelObjectIndex, 1);
          }

          projectiles.splice(index, 1);
        }
      }
    }

    function removeTrackedMesh(mesh) {
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();

      const levelObjectIndex = levelObjects.indexOf(mesh);

      if (levelObjectIndex !== -1) {
        levelObjects.splice(levelObjectIndex, 1);
      }
    }

    function removeCollidableObject(object) {
      if (object.debugHelper) {
        scene.remove(object.debugHelper);
        object.debugHelper.geometry.dispose();
        object.debugHelper.material.dispose();
        const helperIndex = blockHitboxHelpers.indexOf(object.debugHelper);

        if (helperIndex !== -1) {
          blockHitboxHelpers.splice(helperIndex, 1);
        }
      }

      removeTrackedMesh(object.mesh);
    }

    function isWithinActiveCameraRange(x) {
      return x >= camera.position.x - cullingLeftDistance && x <= camera.position.x + cullingRightDistance;
    }

    function disposeEnemy(enemy) {
      disposeEnemyHitboxDebug(enemy);
      removeTrackedMesh(enemy.mesh);
    }

    function cleanupOffscreenGroundTiles() {
      return;
    }

    function updateDynamicCulling() {
      if (!isGameStarted) {
        return;
      }

      for (let index = collidableObjects.length - 1; index >= 0; index -= 1) {
        const object = collidableObjects[index];

        object.active = isWithinActiveCameraRange(object.mesh.position.x);
        object.mesh.visible = object.active;
        if (object.debugHelper) {
          object.debugHelper.visible = SHOW_DEBUG_HITBOXES && object.active;
          object.debugHelper.update();
        }
      }

      for (let index = enemies.length - 1; index >= 0; index -= 1) {
        const enemy = enemies[index];

        enemy.active = isWithinActiveCameraRange(enemy.mesh.position.x);
        enemy.mesh.visible = enemy.active || enemy.isDead;
        if (enemy.type === 'shooter') {
          updateEnemyBounds(enemy);
        }
      }
    }

    function checkProjectileCollisions() {
      if (!isGameStarted || isChangingLevel || isGameCompleted) {
        return;
      }

      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();

      for (const projectile of projectiles) {
        if (hasAABBOverlap(playerBounds, projectile.bounds)) {
          triggerDamageFlash();
          triggerScreenShake(0.28, 0.55);
          showGameOverMenu();
          return;
        }
      }
    }

    function checkEnemyCollisions() {
      if (!isGameStarted || isChangingLevel || isGameCompleted) {
        return;
      }

      updatePlayerHitbox();
      const playerBounds = getPlayerBoundsFromHitbox();

      for (const enemy of enemies) {
        const enemyBounds = enemy.type === 'shooter' ? enemy.ciapetHitbox : enemy.bounds;

        if (enemy.isDead || !enemy.active || !enemyBounds || !hasAABBOverlap(playerBounds, enemyBounds)) {
          continue;
        }

        const stompedEnemy = playerVelocity.y < 0 && previousPlayerBottom >= enemyBounds.top - 0.08;

        if (stompedEnemy) {
          squashEnemy(enemy);
          playerVelocity.y = 8;
          isGrounded = false;
          return;
        }

        triggerDamageFlash();
        triggerScreenShake(0.28, 0.55);
        showGameOverMenu();
        return;
      }
    }

    function checkLevelComplete() {
      if (!targetBar || isChangingLevel || isGameCompleted || !isGameStarted) {
        return;
      }

      updatePlayerHitbox();

      if (!hasAABBOverlap(getPlayerBoundsFromHitbox(), targetBar)) {
        return;
      }

      if (currentLevelCoinsCollected < 3) {
        showTemporaryLevelMessage('Non puoi passare! Trova tutte e 3 le monete obbligatorie!');
        return;
      }

      isChangingLevel = true;
      isGameStarted = false;
      playerVelocity.set(0, 0);
      saveLevelCompleted(currentLevelIndex);
      showWinMenu();
    }

    function updatePlayer(deltaTime) {
      if (!isGameStarted || isChangingLevel || isGameCompleted) {
        playerVelocity.set(0, 0);
        return;
      }

      const keyboardDirection = Number(keys.right) - Number(keys.left);
      const horizontalDirection = mobileInputX !== 0 ? mobileInputX : keyboardDirection;
      playerVelocity.x = horizontalDirection * moveSpeed;

      if (horizontalDirection !== 0) {
        playerFacingDirection = Math.sign(horizontalDirection);
        updatePlayerVisualScale();
      }

      if (jumpRequested && isGrounded) {
        spawnJumpDust();
        playerVelocity.y = jumpVelocity;
        isGrounded = false;
      }

      jumpRequested = false;
      playerVelocity.y += gravity * deltaTime;

      updatePlayerHitbox();
      previousPlayerBottom = playerHitbox.min.y;
      const previousBottom = previousPlayerBottom;
      const previousTop = playerHitbox.max.y;

      isGrounded = false;
      player.position.y += playerVelocity.y * deltaTime;
      resolveVerticalCollisions(previousBottom, previousTop);

      player.position.x += playerVelocity.x * deltaTime;
      resolveHorizontalCollisions();
      clampPlayerToLevelStart();

      if (isGrounded && !hasGroundSupport()) {
        isGrounded = false;
      }

      runDustTimer -= deltaTime;
      if (isGrounded && Math.abs(playerVelocity.x) > moveSpeed * 0.45 && runDustTimer <= 0) {
        spawnRunDust();
        runDustTimer = 0.075;
      }
    }

    function setPlayerTexture(texture) {
      if (currentPlayerTexture === texture) {
        return;
      }

      currentPlayerTexture = texture;
      playerMaterial.map = texture;
      playerMaterial.needsUpdate = true;
      updatePlayerVisualScale();
    }

    function updatePlayerVisualScale() {
      if (!player || !currentPlayerTexture) {
        return;
      }

      const aspectRatio = currentPlayerTexture.userData.aspectRatio || 1;
      player.scale.set(aspectRatio * playerFacingDirection, 1, 1);
    }

    function updatePlayerTexture() {
      if (!isGrounded) {
        setPlayerTexture(playerTextures.gioSalto);
        return;
      }

      if (playerVelocity.x === 0) {
        animationFrame = 0;
        setPlayerTexture(playerTextures.gioFermo);
        return;
      }

      animationFrame += 1;
      const runFrame = Math.floor(animationFrame / runAnimationFrameDelay) % 2;
      setPlayerTexture(runFrame === 0 ? playerTextures.gioCorsa1 : playerTextures.gioCorsa2);
    }

    function updateCameraBounds() {
      const aspect = window.innerWidth / window.innerHeight;
      const worldWidth = worldHeight * aspect;

      camera.left = worldWidth / -2;
      camera.right = worldWidth / 2;
      camera.top = worldHeight / 2;
      camera.bottom = worldHeight / -2;
      camera.near = 0.1;
      camera.far = 100;
      camera.updateProjectionMatrix();
    }

    function handleResize() {
      if (isMobilePortrait()) {
        return;
      }

      updateCameraBounds();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function updateCamera() {
      if (isGameStarted) {
        maxCameraX = Math.max(player.position.x, 0);
      }

      camera.position.x = maxCameraX;
      camera.position.y = 0;
      camera.position.z = 10;
      camera.lookAt(camera.position.x, camera.position.y, 0);

      for (const { layer, parallax } of backgroundLayers) {
        layer.position.x = camera.position.x * parallax;
      }
    }

    function applyScreenShake(deltaTime) {
      if (screenShakeTimer <= 0) {
        return;
      }

      screenShakeTimer -= deltaTime;
      const strength = screenShakeIntensity * Math.max(screenShakeTimer / screenShakeDuration, 0);
      camera.position.y += Math.random() * strength - strength / 2;
      camera.position.z += Math.random() * strength - strength / 2;
    }

    function animate() {
      const deltaTime = Math.min(clock.getDelta(), 0.05);

      if (isPaused) {
        renderer.render(scene, camera);
        return;
      }

      updatePlayerHitbox();
      updateDynamicCulling();
      updateDamageFlash(deltaTime);
      updateDustParticles(deltaTime);
      updatePlayer(deltaTime);
      updateEnemies(deltaTime);
      updateProjectiles(deltaTime);
      updatePlayerHitbox();
      collectCoins();
      collectSpecialCoins();
      checkProjectileCollisions();
      checkEnemyCollisions();
      checkLevelComplete();
      updatePlayerTexture();
      updateCamera();
      applyScreenShake(deltaTime);
      updateDynamicCulling();
      renderer.render(scene, camera);
    }

    updateCameraBounds();
    updatePlayerHitbox();
    updateCoinCounter();
    updateSpecialCoinUI();
    showMainMenu();
    updatePauseButtonVisibility();
    renderer.setAnimationLoop(animate);

    prevZonePageButton.addEventListener('click', () => {
      if (selectedZonePage > 0) {
        selectedZonePage -= 1;
        updateMainMenu();
      }
    });

    nextZonePageButton.addEventListener('click', () => {
      const totalZonePages = Math.ceil(levelsPerZone / levelsPerZonePage);

      if (selectedZonePage < totalZonePages - 1) {
        selectedZonePage += 1;
        updateMainMenu();
      }
    });

    backToZonesButton.addEventListener('click', showZoneHub);
    winMainMenuButton.addEventListener('click', returnToMainMenuFromWin);
    winReplayButton.addEventListener('click', restartCurrentLevel);
    winNextButton.addEventListener('click', goToNextLevel);
    gameOverMainMenuButton.addEventListener('click', returnToMainMenuFromGameOver);
    gameOverRestartButton.addEventListener('click', restartCurrentLevelFromGameOver);
    pauseButton.addEventListener('pointerdown', togglePause);
    pauseMenu.addEventListener('contextmenu', (event) => event.preventDefault());
    pauseMenu.addEventListener('touchmove', (event) => event.preventDefault(), { passive: false });
    resumeButton.addEventListener('pointerdown', resumeGame);
    pauseRestartButton.addEventListener('pointerdown', restartFromPause);
    pauseMainMenuButton.addEventListener('pointerdown', returnToMainMenuFromPause);

    window.addEventListener('resize', handleResize);
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    mobileControls.addEventListener('contextmenu', (event) => event.preventDefault());
    mobileControls.addEventListener('touchmove', (event) => event.preventDefault(), { passive: false });
    joystickBase.addEventListener('pointerdown', handleJoystickPointerDown);
    joystickBase.addEventListener('pointermove', handleJoystickPointerMove);
    joystickBase.addEventListener('pointerup', handleJoystickPointerUp);
    joystickBase.addEventListener('pointercancel', handleJoystickPointerUp);
    jumpButton.addEventListener('pointerdown', handleMobileJump);
  </script>
</body>
</html>
