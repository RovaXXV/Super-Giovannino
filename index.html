<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Giovannino - Platform Base</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #5c94fc;
    }

    canvas {
      display: block;
    }

    #coin-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 32px;
      font-weight: 700;
      text-shadow: 0 3px 0 #000, 0 0 8px rgba(0, 0, 0, 0.75);
      user-select: none;
    }

    #coin-counter img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 3px 0 #000) drop-shadow(0 0 8px rgba(0, 0, 0, 0.75));
    }

    #level-message {
      position: absolute;
      top: 86px;
      left: 50%;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      max-width: min(760px, 92vw);
      padding: 14px 20px;
      border: 2px solid rgba(255, 115, 0, 0.92);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.44);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 800;
      text-align: center;
      text-shadow: 0 4px 0 #000, 0 0 12px rgba(0, 0, 0, 0.8);
      transform: translateX(-50%);
      pointer-events: none;
    }

    #special-coins {
      position: absolute;
      top: 20px;
      left: 50%;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(-50%);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 3px 0 #000, 0 0 8px rgba(0, 0, 0, 0.75);
      user-select: none;
    }

    #special-coins img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: brightness(0.2) grayscale(1) drop-shadow(0 3px 0 #000);
    }

    #special-coins img.collected {
      filter: none;
    }

    #special-coin-count {
      margin-left: 4px;
      padding: 4px 10px;
      border: 2px solid rgba(255, 115, 0, 0.85);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      color: #fff;
    }

    #main-menu {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      box-sizing: border-box;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.75);
      background-image: linear-gradient(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.18)), url("assets/sfondo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      user-select: none;
    }

    #main-menu h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 78px);
      font-weight: 900;
      letter-spacing: 0;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    }

    .menu-screen {
      display: none;
      width: min(860px, 94vw);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .menu-screen.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    #zone-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .zone-card {
      position: relative;
      min-height: 190px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 14px 32px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .zone-card:not(:disabled):hover {
      border-color: #ff7300;
      background: rgba(255, 115, 0, 0.12);
      box-shadow: 0 0 30px rgba(255, 115, 0, 0.68), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .zone-card:disabled {
      cursor: not-allowed;
      opacity: 0.35;
      filter: grayscale(1);
      background: rgba(0, 0, 0, 0.24);
    }

    .zone-card-title {
      display: block;
      color: #ffffff;
      font-size: clamp(30px, 5vw, 54px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    }

    .zone-card-subtitle {
      display: block;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 16px;
      font-weight: 800;
    }

    .zone-progress {
      display: block;
      margin-top: 22px;
      color: #ff7300;
      font-size: 18px;
      font-weight: 900;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.75);
    }

    .zone-panel {
      width: 100%;
      padding: 24px;
      border: 1px solid rgba(255, 115, 0, 0.48);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
    }

    .zone-panel h2 {
      margin: 0 0 18px;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 0;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    }

    #level-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .level-card {
      position: relative;
      min-height: 118px;
      border: 1px solid rgba(255, 115, 0, 0.46);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 18px rgba(0, 0, 0, 0.18);
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .level-card:not(:disabled):hover {
      border-color: #ff7300;
      background: rgba(255, 115, 0, 0.14);
      box-shadow: 0 0 26px rgba(255, 115, 0, 0.78), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .level-card:disabled {
      cursor: not-allowed;
      opacity: 0.38;
      filter: grayscale(1);
      background: rgba(0, 0, 0, 0.24);
    }

    .level-number {
      display: block;
      margin-top: 16px;
      font-size: clamp(38px, 6vw, 62px);
      font-weight: 900;
      line-height: 1;
      color: #ff7300;
    }

    .level-lock {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 26px;
    }

    .level-card-coins {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }

    .level-card-coins img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      image-rendering: pixelated;
      opacity: 0.3;
      filter: grayscale(100%) drop-shadow(0 2px 0 #000);
    }

    .level-card-coins img.collected {
      opacity: 1;
      filter: none;
    }

    .zone-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .zone-page-button {
      min-width: 170px;
      min-height: 48px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 10px;
      background: #ff7300;
      color: #fff;
      font-family: inherit;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.7);
      box-shadow: 0 6px 18px rgba(255, 115, 0, 0.36);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .zone-page-button:not(:disabled):hover {
      background: #ff8a1f;
      box-shadow: 0 0 24px rgba(255, 115, 0, 0.8);
      transform: translateY(-1px);
    }

    .zone-page-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    #zone-page-label {
      min-width: 92px;
      font-size: 18px;
      font-weight: 900;
      color: #ff7300;
    }

    .back-to-zones {
      display: block;
      margin: 0 0 14px;
      min-width: 210px;
    }

    @media (max-width: 680px) {
      #zone-grid {
        grid-template-columns: 1fr;
      }

      .zone-card {
        min-height: 132px;
      }
    }

    #winMenu {
      position: absolute;
      inset: 0;
      z-index: 35;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      text-shadow: 0 4px 0 #000, 0 0 12px rgba(0, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.58);
      user-select: none;
    }

    #winMenu h2 {
      margin: 0;
      font-size: clamp(42px, 7vw, 82px);
      font-weight: 900;
      letter-spacing: 0;
    }

    .win-actions {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .win-actions button {
      min-width: 220px;
      min-height: 68px;
      border: 4px solid #fff;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 22px;
      font-weight: 900;
      text-shadow: 0 3px 0 #000;
      box-shadow: 0 6px 0 #000;
      cursor: pointer;
    }

    #win-main-menu {
      background: #e52521;
    }

    #win-replay {
      background: #2c7be5;
    }

    #win-next {
      background: #2ecc40;
    }

    .win-actions button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    #gameOverMenu {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      text-shadow: 0 4px 0 #000, 0 0 12px rgba(0, 0, 0, 0.9);
      background: rgba(120, 0, 0, 0.72);
      user-select: none;
    }

    #gameOverMenu h2 {
      margin: 0;
      font-size: clamp(54px, 9vw, 108px);
      font-weight: 900;
      letter-spacing: 0;
    }

    .game-over-actions {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .game-over-actions button {
      min-width: 240px;
      min-height: 70px;
      border: 4px solid #fff;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 24px;
      font-weight: 900;
      text-shadow: 0 3px 0 #000;
      box-shadow: 0 6px 0 #000;
      cursor: pointer;
    }

    #game-over-main-menu {
      background: #e52521;
    }

    #game-over-restart {
      background: #2ecc40;
    }

    #pauseButton {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 26;
      display: none;
      width: 48px;
      height: 48px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      background: rgba(255, 102, 0, 0.82);
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(255, 102, 0, 0.55);
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.7);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #pauseMenu {
      position: fixed;
      inset: 0;
      z-index: 45;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      backdrop-filter: blur(10px);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    #pauseMenu h2 {
      margin: 0 0 10px;
      color: #ffffff;
      font-size: clamp(42px, 7vw, 84px);
      font-weight: 900;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    }

    .pause-actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: min(320px, 82vw);
    }

    .pause-actions button {
      min-height: 58px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 10px;
      background: #ff7300;
      color: #fff;
      font-family: inherit;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.7);
      box-shadow: 0 6px 18px rgba(255, 115, 0, 0.36);
    }

    #mobileControls {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    #joystickBase {
      position: absolute;
      left: 28px;
      bottom: 28px;
      width: 100px;
      height: 100px;
      border: 4px solid rgba(220, 220, 220, 0.85);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      box-sizing: border-box;
      pointer-events: auto;
      touch-action: none;
    }

    #joystickHandle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(55, 55, 55, 0.92);
      transform: translate(-50%, -50%);
      pointer-events: auto;
      touch-action: none;
    }

    #jumpButton {
      position: absolute;
      right: 28px;
      bottom: 34px;
      width: 104px;
      height: 104px;
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      background: rgba(229, 37, 33, 0.9);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 20px;
      font-weight: 900;
      text-shadow: 0 2px 0 #000;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.55);
      pointer-events: auto;
      touch-action: none;
    }

    @media (pointer: coarse) {
      #mobileControls {
        display: block;
      }
    }

    #rotateMessage {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 28px;
      box-sizing: border-box;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(24px, 7vw, 44px);
      font-weight: 900;
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 3px 0 #222;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .rotate-phone-icon {
      width: 76px;
      height: 124px;
      border: 7px solid #fff;
      border-radius: 18px;
      position: relative;
      animation: rotatePhoneHint 1.4s ease-in-out infinite;
    }

    .rotate-phone-icon::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }

    @keyframes rotatePhoneHint {
      0%,
      100% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(90deg);
      }
    }

    @media (pointer: coarse) and (orientation: portrait) {
      #rotateMessage {
        display: flex;
      }

      canvas,
      #mobileControls {
        display: none !important;
      }
    }

    @media (pointer: coarse) and (orientation: landscape) {
      #rotateMessage {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="rotateMessage">
    <div class="rotate-phone-icon"></div>
    <div>Per giocare, ruota il dispositivo in orizzontale</div>
  </div>
  <div id="main-menu">
    <h1>SUPER GIOVANNINO</h1>
    <div id="zone-hub" class="menu-screen active">
      <div id="zone-grid"></div>
    </div>
    <div id="zone-levels" class="menu-screen">
      <button id="back-to-zones" class="zone-page-button back-to-zones" type="button">◀ TORNA ALLE ZONE</button>
      <div class="zone-panel">
        <h2 id="selected-zone-title">ZONA 1: L'Inizio dell'Avventura</h2>
        <div id="level-grid"></div>
        <div class="zone-pagination">
          <button id="prev-zone-page" class="zone-page-button" type="button">◀ Precedente</button>
          <div id="zone-page-label">1 / 3</div>
          <button id="next-zone-page" class="zone-page-button" type="button">Successivo ▶</button>
        </div>
      </div>
    </div>
  </div>
  <div id="special-coins">
    <img src="assets/moneta.png" alt="">
    <img src="assets/moneta.png" alt="">
    <img src="assets/moneta.png" alt="">
    <span id="special-coin-count">Monete: 0 / 3</span>
  </div>
  <div id="coin-counter">
    <img src="assets/soldatino.png" alt="">
    <span id="coin-count">0</span>
  </div>
  <div id="level-message"></div>
  <div id="winMenu">
    <h2>LIVELLO COMPLETATO!</h2>
    <div class="win-actions">
      <button id="win-main-menu" type="button">MENU PRINCIPALE</button>
      <button id="win-replay" type="button">RIGIOCA</button>
      <button id="win-next" type="button">PROSSIMO LIVELLO</button>
    </div>
  </div>
  <div id="gameOverMenu">
    <h2>GAME OVER</h2>
    <div class="game-over-actions">
      <button id="game-over-main-menu" type="button">MENU PRINCIPALE</button>
      <button id="game-over-restart" type="button">RICOMINCIA</button>
    </div>
  </div>
  <button id="pauseButton" type="button">║</button>
  <div id="pauseMenu">
    <h2>GIOCO IN PAUSA</h2>
    <div class="pause-actions">
      <button id="resumeButton" type="button">RIPRENDI</button>
      <button id="pauseRestartButton" type="button">RICOMINCIA</button>
      <button id="pauseMainMenuButton" type="button">TORNA AL MENU</button>
    </div>
  </div>
  <div id="mobileControls">
    <div id="joystickBase">
      <div id="joystickHandle"></div>
    </div>
    <button id="jumpButton" type="button">SALTA</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x5c94fc);

    const worldHeight = 15;
    const tileSize = 1;
    const levelBottom = -6.5;
    const SHOW_DEBUG_HITBOXES = true;
    const playerSize = 3;
    const playerHitboxWidthScale = 0.65;
    const playerHitboxHeightScale = 0.9;
    const moveSpeed = 7;
    const gravity = -30;
    const jumpVelocity = 13;
    const collidableObjects = [];
    const coins = [];
    const specialCoins = [];
    const enemies = [];
    const projectiles = [];
    const dustParticles = [];
    const levelObjects = [];
    const blockHitboxHelpers = [];
    const coinSize = 0.9;
    const specialCoinSize = 1.125;
    const enemyHeight = 1.75;
    const enemyWidth = 1.75;
    const enemyHitboxWidth = 1.25;
    const enemyHitboxHeight = 1.48;
    const enemySpeed = 1.5;
    const shooterHeight = 1.9;
    const shooterWidth = 1.9;
    const shooterHitboxWidth = shooterWidth * 0.595;
    const shooterHitboxHeight = shooterHeight * 0.68;
    const shooterHitboxBasePadding = 0.08;
    const projectileSize = 0.32;
    const projectileBaseSpeed = 5;
    const barWidth = 8;
    const barHeight = 8;
    let coinCount = 0;
    let currentLevelCoinsCollected = 0;
    let currentLevelSpecialCoins = [false, false, false];
    let levelGateMessageTimer = null;
    let currentLevelIndex = 0;
    let selectedMenuLevel = 0;
    let selectedZoneIndex = 0;
    let selectedZonePage = 0;
    const levelsPerZone = 20;
    const zoneCount = 4;
    const levelsPerZonePage = 9;
    let targetBar = null;
    let isChangingLevel = false;
    let isGameCompleted = false;
    let isGameStarted = false;
    let isPaused = false;
    let maxCameraX = 0;
    let previousPlayerBottom = 0;
    const cullingLeftDistance = 15;
    const cullingRightDistance = 25;
    const permanentRemovalDistance = 25;
    let screenShakeTimer = 0;
    let screenShakeDuration = 0;
    let screenShakeIntensity = 0;
    let damageFlashTimer = 0;
    let runDustTimer = 0;

    const camera = new THREE.OrthographicCamera();
    camera.position.set(0, 0, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const backgroundLayers = [];
    const textureLoader = new THREE.TextureLoader();
    const coinCounter = document.getElementById('coin-counter');

    function generateLevelStructureLegacy(levelNumber) {
      const level = Math.min(Math.max(levelNumber, 1), totalLevels);
      const progress = totalLevels <= 1 ? 0 : (level - 1) / (totalLevels - 1);
      const width = Math.round(200 + progress * 100);
      const map = Array.from({ length: 8 }, () => Array(width).fill(0));
      const mapHeight = map.length;
      const safeColumns = 6;
      const initialEnd = Math.floor(width * 0.25);
      const middleEnd = Math.floor(width * 0.75);

      const groundHeights = Array(width).fill(minGroundHeight);

      let seed = level * 92821 + 1337;
      let lastEnemyColumn = -999;

      function random() {
        seed = (seed * 1664525 + 1013904223) >>> 0;
        return seed / 4294967296;
      }

      function pick(items) {
        return items[Math.floor(random() * items.length)];
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getSurfaceRow(column) {
        return mapHeight - groundHeights[column];
      }

      function fillGroundColumn(column, height = groundHeights[column]) {
        if (column < 0 || column >= width) {

        groundHeights[column] = clamp(height, minGroundHeight, maxGroundHeight);
        const surfaceRow = getSurfaceRow(column);

        for (let row = 0; row < mapHeight; row += 1) {
          map[row][column] = row < surfaceRow ? 0 : row === surfaceRow ? 1 : 2;
        }
      }

      function clearAirColumn(column) {
        if (column < 0 || column >= width) {
          return;
        }

        const surfaceRow = getSurfaceRow(column);

        for (let row = 0; row < surfaceRow; row += 1) {
          map[row][column] = 0;
        }

      function clearFloatingObjects(column) {
        if (column < 0 || column >= width) {
          return;
        }

        const surfaceRow = getSurfaceRow(column);

        for (let row = 0; row < surfaceRow; row += 1) {
          map[row][column] = 0;
        }
      }

      function isInsidePlayable(column) {
        return column >= safeColumns && column < finalStart;
      }

      function isGroundSafe(column) {
        return column >= 0 && column < width && map[getSurfaceRow(column)][column] === 1;
      }

      function canPlace(row, column) {
        return row >= 0 && row < getSurfaceRow(column) && isInsidePlayable(column) && map[row][column] === 0;
      }

      function placeTile(row, column, value) {
        if (!canPlace(row, column)) {
          return false;
        }

        map[row][column] = value;
        return true;
      }

      function canSpawnEnemy(column, minDistance = 8) {
        return isInsidePlayable(column)
          && column >= safeColumns + 5
          && column < finalStart - 5
          && column - lastEnemyColumn >= minDistance;
      }

      function markEnemySpawn(column) {
        lastEnemyColumn = Math.max(lastEnemyColumn, column);

      function placeGroundEnemy(column, value, minDistance = 8, force = false) {
        const surfaceRow = getSurfaceRow(column);
        const enemyRow = surfaceRow - 1;

        if (enemyRow < 0 || (!force && !canSpawnEnemy(column, minDistance))) {
          return false;
        }

        if (!isInsidePlayable(column) || !isGroundSafe(column) || map[enemyRow][column] !== 0) {
          return false;
        }

        map[enemyRow][column] = value;
        markEnemySpawn(column);

        if (map[platformRow][column] !== 3 && map[platformRow][column] !== 10) {

      function setHeightSmoothly(column, targetHeight) {
        if (column < 0 || column >= finalStart) {

        const previousHeight = column > 0 ? groundHeights[column - 1] : minGroundHeight;
        const nextHeight = clamp(targetHeight, previousHeight - 1, previousHeight + 1);

      function placeSpecialCoin(row, column) {
        for (let radius = 0; radius <= 10; radius += 1) {
          for (let direction = -1; direction <= 1; direction += 2) {
            const candidateColumn = column + radius * direction;

            if (!isInsidePlayable(candidateColumn) || candidateColumn >= finalStart - 3 || usedSpecialColumns.has(candidateColumn)) {

      function removeEnemiesFromColumnRange(start, end) {

          for (let row = 0; row < getSurfaceRow(column); row += 1) {

            }
          }
        }
      }

      function buildRollingTerrain() {
        let currentGroundHeight = minGroundHeight;
        let direction = 1;
        let segmentRemaining = 6;

        for (let column = 0; column < finalStart; column += 1) {
          if (column < safeColumns) {
            currentGroundHeight = minGroundHeight;
          } else if (segmentRemaining <= 0) {
            const phaseColumn = column / finalStart;
            const holdChance = phaseColumn < 0.25 ? 0.45 : phaseColumn < 0.75 ? 0.28 : 0.18;

            direction = random() < holdChance ? 0 : pick([-1, 1]);
            segmentRemaining = 3 + Math.floor(random() * (phaseColumn < 0.75 ? 6 : 4));
          }

          if (column >= safeColumns) {
            currentGroundHeight = clamp(currentGroundHeight + direction, minGroundHeight, maxGroundHeight);

            if (currentGroundHeight === minGroundHeight) {
              direction = random() < 0.35 ? 0 : 1;
            } else if (currentGroundHeight === maxGroundHeight) {
              direction = random() < 0.35 ? 0 : -1;
            }

            segmentRemaining -= 1;
          }

          setHeightSmoothly(column, currentGroundHeight);
        }

      function buildStair(start, peakHeight, sideLength) {
        const baseHeight = groundHeights[Math.max(start - 1, 0)];
        const climbLength = Math.max(2, sideLength);
        const totalLength = climbLength * 2 + 1;

        for (let offset = 0; offset < totalLength && start + offset < finalStart - 2; offset += 1) {
          const column = start + offset;
          const distanceFromPeak = Math.abs(offset - climbLength);
          const targetHeight = clamp(peakHeight - distanceFromPeak, minGroundHeight, maxGroundHeight);
          const blendedHeight = Math.max(targetHeight, Math.min(maxGroundHeight, baseHeight + Math.min(offset + 1, totalLength - offset)));
          setHeightSmoothly(column, blendedHeight);
        }

        return start + climbLength;

      function addGeometricStairs() {
        const stairCount = 5 + Math.floor(progress * 8);

        for (let index = 0; index < stairCount; index += 1) {
          const phaseStart = index % 3 === 0 ? initialEnd : index % 3 === 1 ? middleEnd - Math.floor(width * 0.25) : middleEnd;
          const phaseSpan = index % 3 === 0 ? initialEnd - safeColumns : Math.floor(width * 0.28);
          const start = clamp(phaseStart + Math.floor(random() * Math.max(8, phaseSpan)), safeColumns + 10, finalStart - 16);
          const peakHeight = clamp(3 + Math.floor(random() * (index < 2 ? 2 : 3)), 3, maxGroundHeight);
          const sideLength = 2 + Math.floor(random() * 3);
          buildStair(start, peakHeight, sideLength);
        }
      }

      function normalizeGroundHeights() {
        for (let column = 1; column < finalStart; column += 1) {
          groundHeights[column] = clamp(
            groundHeights[column],
            groundHeights[column - 1] - 1,
            groundHeights[column - 1] + 1

        }

        groundHeights[finalStart - 1] = minGroundHeight;

        for (let column = finalStart - 2; column >= 0; column -= 1) {
          groundHeights[column] = clamp(
            groundHeights[column],
            groundHeights[column + 1] - 1,
            groundHeights[column + 1] + 1
          );
        }

        for (let column = 1; column < finalStart; column += 1) {
          groundHeights[column] = clamp(
            groundHeights[column],
            groundHeights[column - 1] - 1,
            groundHeights[column - 1] + 1
          );
        }
      }

      function rebuildTerrainFromHeights() {
        for (let column = 0; column < width; column += 1) {
          if (column >= finalStart) {
            groundHeights[column] = minGroundHeight;
          }

          fillGroundColumn(column, groundHeights[column]);
        }
      }

      function findPeaks() {
        const peaks = [];

        for (let column = safeColumns + 4; column < finalStart - 4; column += 1) {
          const height = groundHeights[column];
          const left = groundHeights[column - 1];
          const right = groundHeights[column + 1];

          if (height >= 4 && height >= left && height >= right && (height > left || height > right)) {
            peaks.push(column);
          }
        }

        return peaks;

      function findValleys() {
        const valleys = [];

        for (let column = safeColumns + 5; column < finalStart - 5; column += 1) {
          const height = groundHeights[column];
          const wasDescending = groundHeights[column - 2] > groundHeights[column - 1] && groundHeights[column - 1] >= height;
          const recoveryAhead = groundHeights[column + 1] >= height && groundHeights[column + 2] > height;

          if (height <= 3 && wasDescending && recoveryAhead) {
            valleys.push(column);
          }
        }

        return valleys;

      function addCoinsOnSlopes() {
        for (let column = safeColumns + 8; column < finalStart - 8; column += 9 + Math.floor(random() * 8)) {

      function buildAirTerrace(start, length, row) {

        if (!valid) {

        placeBrickRow(row, start, length, 4);

      function addAirTerraces() {
        const terraceCount = 2 + Math.floor(progress * 7);
        const terraces = [];

        for (let index = 0; index < terraceCount; index += 1) {
          const column = clamp(
            Math.floor(width * (0.28 + random() * 0.58)),
            safeColumns + 12,
            finalStart - 14

          const length = 4 + Math.floor(random() * 4);
          const row = clamp(getSurfaceRow(column) - 3 - Math.floor(random() * 2), 2, 4);
          const terrace = buildAirTerrace(column, length, row);

          if (terrace) {
            terraces.push(terrace);
          }
        }

        return terraces;

      function addTacticalEnemies(terraces) {
        const peaks = findPeaks();
        const valleys = findValleys();
        const guardianStep = Math.max(2, Math.floor(5 - progress * 2));
        const ambushStep = Math.max(2, Math.floor(5 - progress * 2));

        for (let index = 0; index < peaks.length; index += guardianStep) {

        const firstRow = getSurfaceRow(firstColumn) - 2;
        placeSpecialCoin(firstRow, firstColumn);

        const middleTerrace = terraces.find((terrace) => terrace.start > initialEnd && terrace.start < middleEnd);
        if (middleTerrace) {
          placeSpecialCoin(Math.max(0, middleTerrace.row - 2), middleTerrace.start + Math.floor(middleTerrace.length / 2));
        } else {

        const advancedTerrace = [...terraces].reverse().find((terrace) => terrace.start > middleEnd && terrace.start < finalStart - 8);
        if (advancedTerrace) {

        } else {

          placeSpecialCoin(getSurfaceRow(advancedColumn) - 4, advancedColumn);

        while (usedSpecialColumns.size < 3) {

          placeSpecialCoin(getSurfaceRow(fallbackColumn) - 3, fallbackColumn);

      addGeometricStairs();
      normalizeGroundHeights();
      rebuildTerrainFromHeights();

      for (let column = 0; column < safeColumns; column += 1) {

        clearAirColumn(column);

      for (let column = finalStart; column < width; column += 1) {

      addCoinsOnSlopes();
      addTacticalEnemies(terraces);
      placeMandatorySpecialCoins(terraces);

      if (!map.some((row) => row.includes(10))) {

        clearAirColumn(column);

      removeEnemiesFromColumnRange(finalStart - 2, width - 1);
      map[5][barColumn] = 5;

      return map;

    function generateLevelStructure(levelNumber) {

        if (column < 0 || column >= finalStart) {
          return;

        const previousHeight = column > 0 && groundHeights[column - 1] !== null
          ? groundHeights[column - 1]
          : currentGroundHeight;

          clamp(targetHeight, previousHeight - 1, previousHeight + 1),
          minGroundHeight,
          maxGroundHeight
        );

      }

      function clearColumn(column) {
        if (column < 0 || column >= width) {
          return;
        }

        groundHeights[column] = null;

        for (let row = 0; row < mapHeight; row += 1) {

      function fillGroundColumn(column, height = groundHeights[column]) {

        groundHeights[column] = clamp(height, minGroundHeight, maxGroundHeight);
        const surfaceRow = getSurfaceRow(column);

        for (let row = 0; row < mapHeight; row += 1) {

        }

      function clearAirColumn(column) {

        if (surfaceRow === null) {

        }

        for (let row = 0; row < surfaceRow; row += 1) {
          map[row][column] = 0;
